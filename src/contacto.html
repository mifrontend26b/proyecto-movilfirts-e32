<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LA PUERTA TEES - Contacto</title>
</head>
<body>
    <header>
        <img src="./assets/logo_empresa.png" alt="Logo La Puerta Tees" class="logo-principal">
        <button id="menu-btn">☰ Menú</button>
        <nav>
            <ul>

            </ul>
        </nav>
    </header>

    <main>
        <h2>Realiza tu Pedido</h2>
        <form id="formPedido">
            <input type="text" id="nombre" name="nombre" placeholder="Tu Nombre Completo" required>
            <input type="email" id="correo" name="correo" placeholder="Correo electrónico" required>
            <input type="tel" id="telefono" name="telefono" placeholder="Teléfono" required>
            <input type="number" id="cantidad" name="cantidad" placeholder="Cantidad de camisas" required>
            <textarea id="detalles" name="detalles" placeholder="Detalles del pedido (Tallas, diseños específicos)"></textarea>
            <button type="submit">Enviar Solicitud</button>
        </form>
    </main>

    <footer>

    </footer>
